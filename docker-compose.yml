version: '3.8'

services:
  mssql-primary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-primary
    hostname: mssql-primary
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng!Passw0rd"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1435:1433"
    volumes:
      - mssql-primary-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Str0ng!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - replication-net

  mssql-replica:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-replica
    hostname: mssql-replica
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng!Passw0rd"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1434:1433"
    volumes:
      - mssql-replica-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Str0ng!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - replication-net

  replication-setup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: replication-setup
    depends_on:
      mssql-primary:
        condition: service_healthy
      mssql-replica:
        condition: service_healthy
    volumes:
      - ./db/init:/scripts/init
      - ./db/replication:/scripts/replication
      - ./db/setup-all.sh:/scripts/setup-all.sh
    entrypoint: /bin/bash
    command: /scripts/setup-all.sh
    networks:
      - replication-net

volumes:
  mssql-primary-data:
  mssql-replica-data:

networks:
  replication-net:
    driver: bridge
